<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="SI Helper">
<link rel="manifest" href="manifest.json">
<title>Spirit Island Helper</title>
<style>
@font-face {
  font-family: 'FreehandSpirit';
  src: url('font/FreehandSpirit07.ttf') format('truetype');
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #120e06;
  --surface: #1e1608;
  --card: #2a1f0c;
  --border: #4a3518;
  --text: #e8d5a3;
  --muted: #9a8460;
  --gold: #c9a227;
  --green: #5a9e4e;
  --blue: #4a9cc9;
  --red: #c94444;
  --red-bg: #3a0f0f;
  --orange: #d4782a;
}
* { touch-action: manipulation; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: Georgia, 'Times New Roman', serif;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
}
.gs { font-family: 'FreehandSpirit', serif; font-size: 1.15em; display: inline-block; vertical-align: middle; line-height: 1; }
#zone1 .gs { display: inline; vertical-align: baseline; font-size: 1em; }
.stage {
  position: fixed; inset: 0;
  display: none; flex-direction: column;
  padding: 12px 16px;
}
.stage.active { display: flex; }

/* ── RESET BTN ── */
#resetBtn {
  position: fixed; top: 10px; right: 12px; z-index: 1000;
  background: var(--card); border: 1px solid var(--border);
  color: var(--muted); font-size: 13px; padding: 6px 14px;
  border-radius: 6px; cursor: pointer; transition: all .2s;
  font-family: Georgia, serif;
}
#resetBtn.confirm { background: var(--red-bg); border-color: var(--red); color: var(--red); }

/* ── BUTTONS ── */
.btn-primary {
  background: var(--gold); color: #1a1208;
  border: none; border-radius: 8px; padding: 12px 28px;
  font-size: 16px; font-family: Georgia, serif;
  font-weight: bold; cursor: pointer; min-height: 48px;
}
.btn-primary:active { opacity: .8; }
.btn-secondary {
  background: var(--card); color: var(--gold);
  border: 1px solid var(--gold); border-radius: 8px;
  padding: 12px 24px; font-size: 16px;
  font-family: Georgia, serif; cursor: pointer; min-height: 48px;
}
.btn-secondary:active { opacity: .7; }
.btn-icon {
  background: var(--card); color: var(--text);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 18px; font-size: 20px; cursor: pointer;
  font-family: Georgia, serif; min-height: 44px; min-width: 44px;
}

/* ── STAGE HEADER & FOOTER ── */
.stage-title {
  font-size: 22px; color: var(--gold);
  letter-spacing: 1px; text-align: center;
  padding-bottom: 8px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.stage-footer {
  display: flex; justify-content: space-between; align-items: center;
  gap: 16px; padding-top: 10px; flex-shrink: 0;
}
#stage1 .stage-footer { justify-content: flex-end; }
.btn-back {
  background: transparent; border: 1px solid var(--border);
  color: var(--muted); border-radius: 8px;
  padding: 10px 20px; font-size: 15px;
  font-family: Georgia, serif; cursor: pointer;
}
.btn-back:active { background: var(--card); }

/* ═══════════════════════════════════════
   STAGE 1
═══════════════════════════════════════ */
#stage1 .player-row {
  display: flex; align-items: center; gap: 16px;
  padding: 10px 0; flex-shrink: 0; flex-wrap: wrap;
}
#stage1 .player-row label { font-size: 15px; color: var(--muted); white-space: nowrap; }
#randomizeSpiritsBtn { margin-left: 12px; }
#playerBtns { display: flex; gap: 8px; }
.board-options-row {
  display: flex; align-items: center; gap: 10px;
  padding: 0 0 8px 0; flex-shrink: 0; flex-wrap: wrap;
}
.board-options-row label { font-size: 13px; color: var(--muted); white-space: nowrap; }
.opt-toggle {
  background: var(--card); border: 1px solid var(--border);
  color: var(--muted); border-radius: 6px;
  padding: 6px 14px; font-size: 13px;
  font-family: Georgia, serif; cursor: pointer;
}
.opt-toggle.active {
  border-color: var(--gold); color: var(--gold); background: #2e2210;
}
#playerBtns button {
  width: 44px; height: 44px; border-radius: 50%;
  border: 2px solid var(--border); background: var(--card);
  color: var(--text); font-size: 18px; cursor: pointer;
  font-family: Georgia, serif;
}
#playerBtns button.active { border-color: var(--gold); color: var(--gold); background: #2e2210; }
#spiritsWrap { flex: 1; display: flex; flex-direction: column; justify-content: center; }
#spiritsTable {
  width: 100%; border-collapse: collapse;
  font-size: 15px;
}
#spiritsTable thead th {
  text-align: left; padding: 8px 12px;
  color: var(--muted); font-weight: normal;
  border-bottom: 1px solid var(--border); font-size: 13px;
}
#spiritsTable tbody tr { border-bottom: 1px solid #2a1e08; }
#spiritsTable tbody td { padding: 9px 12px; }
#spiritsTable .col-num { color: var(--muted); font-size: 13px; width: 30px; }
#spiritsTable .col-board {
  text-align: center; font-size: 20px;
  color: var(--gold); font-weight: bold; width: 50px;
}
.spirit-name { color: var(--green); }
.spirit-sep { color: var(--muted); margin: 0 4px; }
.spirit-aspect { color: var(--orange); }
.no-spirits {
  text-align: center; color: var(--muted);
  padding: 30px; font-style: italic; font-size: 15px;
}
#spiritsTable .col-reroll { width: 44px; text-align: center; }
.reroll-btn {
  width: 34px; height: 34px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--card);
  color: var(--muted); font-size: 18px; cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  line-height: 1;
}
.reroll-btn:active { background: #2e2210; color: var(--gold); border-color: var(--gold); }

/* ═══════════════════════════════════════
   STAGE 2
═══════════════════════════════════════ */
#stage2 .adversary-menu {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 4px 0;
}
.adv-menu-row {
  display: flex; align-items: center; gap: 6px; flex-shrink: 0;
}
.adv-btn {
  background: var(--card); border: 1px solid var(--border);
  color: var(--text); padding: 8px 14px;
  border-radius: 6px; font-size: 14px;
  font-family: Georgia, serif; cursor: pointer;
}
.adv-btn.active { border-color: var(--gold); color: var(--gold); background: #2e2210; }
#stage2 .adv-body {
  flex: 1; display: flex; gap: 16px; overflow: hidden;
  padding: 8px 0;
}
#adversaryImgWrap {
  flex: 2;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface); border-radius: 8px;
  border: 1px solid var(--border); overflow: hidden;
}
#adversaryImg { max-width: 100%; max-height: 100%; object-fit: contain; }
#adversaryImgWrap .no-image { color: var(--muted); font-size: 14px; text-align: center; padding: 20px; }
#stage2 .adv-right {
  flex: 1; display: flex; flex-direction: column; gap: 12px;
}
.level-row { display: flex; align-items: center; gap: 10px; }
.level-row label { color: var(--muted); font-size: 14px; }
#levelBtns { display: flex; gap: 6px; }
#levelBtns button {
  width: 44px; height: 44px; border-radius: 6px;
  border: 2px solid var(--border); background: var(--card);
  color: var(--text); font-size: 16px; cursor: pointer;
  font-family: Georgia, serif;
}
#levelBtns button.active { border-color: var(--gold); color: var(--gold); background: #2e2210; }
#levelBtns button.hidden-btn { display: none; }
#difficultyDisplay {
  padding: 10px 14px; background: var(--surface);
  border-radius: 8px; font-size: 15px;
  border: 1px solid var(--border);
}
#difficultyDisplay .diff-label { color: var(--muted); font-size: 12px; margin-bottom: 2px; }
#difficultyDisplay .diff-value { color: var(--gold); font-size: 20px; font-weight: bold; }

/* ═══════════════════════════════════════
   STAGE 3
═══════════════════════════════════════ */
#stage3Content {
  flex: 1; overflow: hidden;
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; padding: 8px 0;
}
.setup-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 14px;
}
.setup-label {
  font-size: 11px; text-transform: uppercase;
  letter-spacing: 1px; color: var(--muted); margin-bottom: 4px;
}
.setup-value { font-size: 14px; color: var(--text); line-height: 1.5; }
.setup-value .gs { font-size: 15px; }
#stage3Content .full-col { grid-column: 1 / -1; }
.constant-reminder-card {
  background: var(--red-bg); border-color: var(--red) !important;
}
.constant-reminder-card .setup-label { color: #e08080; }
.constant-reminder-card .setup-value { color: #f0c0c0; }

/* ═══════════════════════════════════════
   STAGE 4
═══════════════════════════════════════ */
#stage4 { padding: 0; gap: 0; }

/* Zone 1 */
#zone1 {
  flex-shrink: 0; background: var(--surface);
  border-bottom: 2px solid var(--border);
  display: flex; flex-direction: column;
}
#z1-identity {
  display: flex; align-items: center; gap: 14px;
  padding: 10px 80px 10px 14px;
  border-bottom: 1px solid var(--border);
}
#headerFlag {
  height: 52px; border-radius: 4px;
  border: 1px solid var(--border); flex-shrink: 0;
}
#headerTitle {
  font-size: 22px; color: var(--gold); font-weight: bold; flex: 1;
}
#headerDifficulty {
  font-size: 16px; color: var(--muted); white-space: nowrap;
}
#z1-conditions {
  display: flex; align-items: stretch; gap: 0;
  padding: 8px 80px 8px 14px; font-size: 13px; line-height: 1.5;
  min-height: 40px;
}
#headerLoss {
  color: var(--red); flex: 1;
  padding-right: 14px; padding-top: 2px;
}
.z1-cond-divider { width: 1px; background: var(--border); margin: 2px 14px 2px 0; flex-shrink: 0; }
#headerEscalation {
  flex: 2; color: var(--text); display: flex; align-items: flex-start; padding-top: 2px;
}
#headerEscalation .esc-label {
  color: var(--muted); font-size: 11px; text-transform: uppercase;
  letter-spacing: .5px; margin-right: 6px; flex-shrink: 0; align-self: flex-start; padding-top: 2px;
}
#constantReminderBar {
  background: var(--red-bg); border-top: 1px solid var(--red);
  padding: 9px 80px 9px 14px; display: flex; align-items: flex-start; gap: 8px;
  font-size: 13px; color: #f0c0c0; line-height: 1.5; white-space: pre-wrap;
}
#constantReminderBar.hidden { display: none; }
#constantReminderBar::before {
  content: '⚠';
  color: var(--red); font-size: 16px; flex-shrink: 0; align-self: flex-start;
}

/* Game content */
#gameContent {
  flex: 1; display: flex; overflow: hidden;
}

/* Zone 3 */
#zone3 {
  flex: 1; display: flex; flex-direction: column;
  border-right: 2px solid var(--border); overflow: hidden;
}
#phaseLayout {
  flex: 1; display: flex; overflow: hidden;
}
#phaseList {
  width: 170px; flex-shrink: 0;
  border-right: 1px solid var(--border);
  overflow-y: auto; background: var(--bg); padding: 6px 0;
}
.phase-list-item {
  padding: 8px 12px 8px 14px; font-size: 13px;
  color: var(--muted); cursor: pointer;
  border-left: 3px solid transparent; line-height: 1.3;
  transition: background .1s;
}
.phase-list-item.active {
  color: var(--gold); border-left-color: var(--gold);
  background: var(--surface); font-weight: bold;
}
.phase-list-item:hover:not(.active) { color: var(--text); background: var(--surface); }
#phaseMain {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
}
#phaseLabel {
  font-size: 22px; color: var(--gold); font-weight: bold;
  letter-spacing: .5px; padding: 10px 16px; flex-shrink: 0;
  background: var(--card); border-bottom: 1px solid var(--border);
}
#phaseBody {
  flex: 1; padding: 16px 20px; overflow: hidden;
  font-size: 15px; line-height: 1.7; color: var(--text);
}
#phaseBody .no-special { color: var(--muted); font-style: italic; }
#phaseBody .phase-text { white-space: pre-wrap; }
#phaseNav {
  display: flex; align-items: center;
  gap: 8px; padding: 10px 16px 10px 130px;
  border-top: 1px solid var(--border);
  background: var(--card); flex-shrink: 0; position: relative;
}
#reminderForm {
  padding: 10px 16px 12px; background: var(--card);
  border-top: 1px solid rgba(205,145,10,.35); flex-shrink: 0;
  display: flex; flex-direction: column; gap: 8px;
}
#reminderForm.hidden { display: none; }
#reminderFormFor {
  font-size: 11px; color: var(--gold); text-transform: uppercase;
  letter-spacing: .6px; opacity: .85;
}
.reminder-form-row { display: flex; gap: 8px; align-items: center; }
#reminderInput {
  flex: 1; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); border-radius: 6px; padding: 7px 10px;
  font-family: Georgia, serif; font-size: 13px; resize: none; height: 44px;
}
.reminder-form-controls { display: flex; gap: 6px; align-items: center; }
.reminder-dot {
  display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  background: var(--gold); margin-left: 5px; vertical-align: middle; flex-shrink: 0;
}
.phase-list-item { user-select: none; -webkit-user-select: none; }
#reminderBar { flex-shrink: 0; }
#reminderBar:empty { display: none; }
.reminder-chip {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 12px 9px 14px; font-size: 13px; line-height: 1.5;
  border-left: 4px solid var(--gold);
  background: rgba(205, 145, 10, 0.14);
  border-bottom: 1px solid rgba(205, 145, 10, 0.2);
}
.reminder-chip-text { flex: 1; color: var(--text); white-space: pre-wrap; word-break: break-word; font-style: italic; }
.reminder-chip-text.empty { color: var(--gold); font-style: normal; font-size: 12px; letter-spacing: .5px; text-transform: uppercase; }
.reminder-chip-btn {
  flex-shrink: 0; background: none; border: 1px solid rgba(205,145,10,.4);
  color: var(--gold); border-radius: 4px; padding: 2px 7px; font-size: 13px;
  cursor: pointer; font-family: Georgia, serif;
}
.reminder-chip-btn:active { background: #2e2210; }
.phase-nav-btn {
  flex: 1; height: 52px; border-radius: 8px;
  border: 2px solid var(--gold); background: var(--surface);
  color: var(--gold); font-size: 22px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-family: Georgia, serif;
}
.phase-nav-btn:active { background: #2e2210; }

/* Zone 2 */
#zone2 {
  width: 240px; flex-shrink: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; padding: 14px 14px; background: var(--card);
}
#fearIcon { width: 64px; height: 64px; object-fit: contain; }
#fearCount {
  display: flex; align-items: baseline; gap: 6px;
}
#fearY { font-size: 52px; color: var(--gold); font-weight: bold; }
.fear-sep { font-size: 36px; color: var(--muted); }
#fearX { font-size: 36px; color: var(--muted); }
.fear-btn {
  width: 100%; height: 58px; border-radius: 10px;
  border: 2px solid var(--gold); background: var(--surface);
  color: var(--gold); font-size: 36px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-family: Georgia, serif;
}
.fear-btn:active { background: #2e2210; }
#fearCardMsg {
  background: var(--gold); color: #1a1208;
  border-radius: 8px; padding: 8px 12px;
  font-size: 15px; font-weight: bold;
  text-align: center; width: 100%;
}
#fearCardMsg.hidden { display: none; }
#editFearMaxBtn {
  background: var(--surface); color: var(--muted);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 14px; font-size: 13px;
  font-family: Georgia, serif; cursor: pointer;
}

/* ── MODAL ── */
#modal {
  position: fixed; inset: 0; z-index: 2000;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,.7);
}
#modal.hidden { display: none; }
.modal-box {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px;
  width: 320px; display: flex; flex-direction: column; gap: 16px;
}
.modal-box h3 { color: var(--gold); font-size: 18px; }
.modal-box p { color: var(--muted); font-size: 14px; }
.modal-box input[type="number"] {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); font-size: 28px; text-align: center;
  border-radius: 8px; padding: 10px; width: 100%;
  font-family: Georgia, serif;
}
.modal-btns { display: flex; gap: 10px; }
.modal-btns button { flex: 1; }
</style>
</head>
<body>

<button id="resetBtn">Reset</button>

<!-- STAGE 1: Players + Spirits -->
<div id="stage1" class="stage active">
  <div class="stage-title">Spirit Island Helper</div>
  <div class="player-row">
    <label>Number of players:</label>
    <div id="playerBtns"></div>
    <button class="btn-secondary" id="randomizeSpiritsBtn">Randomize</button>
  </div>
  <div class="board-options-row">
    <label>Expansions:</label>
    <button class="opt-toggle active" data-exp="Base">Base</button>
    <button class="opt-toggle active" data-exp="Branch and Claw">Branch &amp; Claw</button>
    <button class="opt-toggle active" data-exp="Feather and Flame">Feather &amp; Flame</button>
    <button class="opt-toggle active" data-exp="Jagged Earth">Jagged Earth</button>
    <button class="opt-toggle active" data-exp="Nature Incarnate">Nature Incarnate</button>
    <button class="opt-toggle active" data-exp="Horizons">Horizons</button>
  </div>
  <div class="board-options-row">
    <label>Options:</label>
    <button class="opt-toggle" id="horizonsBoards">Boards G &amp; H</button>
    <button class="opt-toggle" id="balanceToggle">Balance Restriction</button>
  </div>
  <div id="spiritsWrap">
    <table id="spiritsTable">
      <thead><tr><th>#</th><th>Spirit / Aspect</th><th>Board</th><th></th></tr></thead>
      <tbody id="spiritsBody"><tr><td colspan="3" class="no-spirits">Press Randomize to assign spirits</td></tr></tbody>
    </table>
  </div>
  <div class="stage-footer">
    <button class="btn-primary" id="stage1Btn">Continue →</button>
  </div>
</div>

<!-- STAGE 2: Adversary -->
<div id="stage2" class="stage">
  <div class="stage-title">Select Adversary</div>
  <div class="adv-menu-row">
    <div class="adversary-menu" id="adversaryMenu"></div>
    <button class="btn-secondary" id="randomizeAdvBtn">Randomize</button>
  </div>
  <div class="adv-body">
    <div id="adversaryImgWrap">
      <div class="no-image" id="noImage">No Adversary</div>
      <img id="adversaryImg" src="" alt="" style="display:none">
    </div>
    <div class="adv-right">
      <div class="level-row">
        <label>Level:</label>
        <div id="levelBtns"></div>
      </div>
      <div id="difficultyDisplay" style="display:none">
        <div class="diff-label">Difficulty</div>
        <div class="diff-value" id="diffValue">—</div>
      </div>
    </div>
  </div>
  <div class="stage-footer">
    <button class="btn-back" id="stage2BackBtn">← Back</button>
    <button class="btn-primary" id="stage2Btn">Continue →</button>
  </div>
</div>

<!-- STAGE 3: Setup -->
<div id="stage3" class="stage">
  <div class="stage-title" id="stage3Title">Setup</div>
  <div id="stage3Content"></div>
  <div class="stage-footer">
    <button class="btn-back" id="stage3BackBtn">← Back</button>
    <button class="btn-primary" id="stage3Btn">Start Game →</button>
  </div>
</div>

<!-- STAGE 4: Game Guide -->
<div id="stage4" class="stage">
  <div id="zone1">
    <div id="z1-identity">
      <img id="headerFlag" src="" alt="" style="display:none">
      <div id="headerTitle"></div>
      <div id="headerDifficulty"></div>
    </div>
    <div id="z1-conditions">
      <div id="headerLoss"></div>
      <div class="z1-cond-divider"></div>
      <div id="headerEscalation">
        <span class="esc-label">Escalation:</span>
        <span id="escalationText">—</span>
      </div>
    </div>
    <div id="constantReminderBar" class="hidden"></div>
  </div>
  <div id="gameContent">
    <div id="zone3">
      <div id="phaseLayout">
        <div id="phaseList"></div>
        <div id="phaseMain">
          <div id="phaseLabel">Growth</div>
          <div id="reminderBar"></div>
          <div id="phaseBody"></div>
        </div>
      </div>
      <div id="reminderForm" class="hidden">
        <div id="reminderFormFor"></div>
        <div class="reminder-form-row">
          <textarea id="reminderInput" placeholder="Reminder text (optional)..."></textarea>
          <div class="reminder-form-controls">
            <button class="btn-secondary" id="reminderCancelBtn">Cancel</button>
            <button class="btn-primary" id="reminderSaveBtn">Add</button>
          </div>
        </div>
      </div>
      <div id="phaseNav">
        <button class="btn-back" id="stage4BackBtn" style="position:absolute;left:16px">← Setup</button>
        <button class="phase-nav-btn" id="prevPhaseBtn">&#8592;</button>
        <button class="phase-nav-btn" id="nextPhaseBtn">&#8594;</button>
      </div>
    </div>

// STATE

const ALL_EXPANSIONS = ['Base','Branch and Claw','Feather and Flame','Jagged Earth','Nature Incarnate','Horizons'];

const S = {
  players: 2,
  spirits: [],
  adversary: 'None',
  level: 0,
  fearCurrent: 0,
  fearMax: 0,
  phaseIdx: 0,
  activePhases: [],
  expansions: new Set(ALL_EXPANSIONS),
  includeHorizonsBoards: false,
  balanceBoards: false,
  reminders: {},
  resetClicks: 0,
  resetTimer: null,
  wakeLock: null
};

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function fmtText(text) {
  if (!text) return '';
  let t = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t = t.replace(/\n/g, '<br>');
  t = t.replace(/(?<![A-Za-z])([TCBDAENFMS])(?![A-Za-z])/g, '<span class="gs">$1</span>');
  return t;
}

function getLevelData() {
  return ADVERSARY_LEVELS[S.adversary][S.level];
}

function $ (id) { return document.getElementById(id); }

// ═══════════════════════════════════════════════════════
// WAKE LOCK
// ═══════════════════════════════════════════════════════
async function acquireWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      S.wakeLock = await navigator.wakeLock.request('screen');
    }
  } catch(_) {}
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') acquireWakeLock();
});

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
window.addEventListener('load', () => {
  acquireWakeLock();
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }

  // Disable pinch zoom (iOS 10+ ignores user-scalable=no in viewport)
  document.addEventListener('touchmove', e => {
    if (e.touches.length > 1) e.preventDefault();
  }, { passive: false });

  initReset();
  initStage1();
  initStage2();
  initStage3();
  initStage4();
});

function showStage(n) {
  document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
  $('stage' + n).classList.add('active');
}

// ═══════════════════════════════════════════════════════
// RESET
// ═══════════════════════════════════════════════════════
function initReset() {
  const btn = $('resetBtn');
  btn.addEventListener('click', () => {
    S.resetClicks++;
    if (S.resetClicks === 1) {
      btn.textContent = 'Confirm Reset?';
      btn.classList.add('confirm');
      S.resetTimer = setTimeout(() => {
        S.resetClicks = 0;
        btn.textContent = 'Reset';
        btn.classList.remove('confirm');
      }, 3000);
    } else {
      clearTimeout(S.resetTimer);
      S.resetClicks = 0;
      btn.textContent = 'Reset';
      btn.classList.remove('confirm');
      doReset();
    }
  });
}

function doReset() {
  S.players = 2;
  S.spirits = [];
  S.adversary = 'None';
  S.level = 0;
  S.fearCurrent = 0;
  S.fearMax = 0;
  S.phaseIdx = 0;
  S.activePhases = [];
  S.expansions = new Set(ALL_EXPANSIONS);
  S.includeHorizonsBoards = false;
  S.balanceBoards = false;
  S.reminders = {};
  document.querySelectorAll('[data-exp]').forEach(btn => btn.classList.add('active'));
  $('horizonsBoards').classList.remove('active');
  $('balanceToggle').classList.remove('active');
  renderPlayerBtns();
  renderSpiritsTable();
  showStage(1);
}

// ═══════════════════════════════════════════════════════
// STAGE 1
// ═══════════════════════════════════════════════════════
function initStage1() {
  renderPlayerBtns();
  $('randomizeSpiritsBtn').addEventListener('click', randomizeSpirits);
  $('stage1Btn').addEventListener('click', () => { showStage(2); updateStage2(); });
  document.querySelectorAll('[data-exp]').forEach(btn => {
    btn.addEventListener('click', () => {
      const exp = btn.dataset.exp;
      if (S.expansions.has(exp)) {
        S.expansions.delete(exp);
        btn.classList.remove('active');
      } else {
        S.expansions.add(exp);
        btn.classList.add('active');
      }
    });
  });
  $('horizonsBoards').addEventListener('click', () => {
    S.includeHorizonsBoards = !S.includeHorizonsBoards;
    $('horizonsBoards').classList.toggle('active', S.includeHorizonsBoards);
  });
  $('balanceToggle').addEventListener('click', () => {
    S.balanceBoards = !S.balanceBoards;
    $('balanceToggle').classList.toggle('active', S.balanceBoards);
  });
}

function renderPlayerBtns() {
  const wrap = $('playerBtns');
  wrap.innerHTML = '';
  for (let i = 1; i <= 6; i++) {
    const b = document.createElement('button');
    b.textContent = i;
    if (i === S.players) b.classList.add('active');
    b.addEventListener('click', () => {
      S.players = i;
      document.querySelectorAll('#playerBtns button').forEach((x,j) => {
        x.classList.toggle('active', j + 1 === i);
      });
    });
    wrap.appendChild(b);
  }
}

const BOARD_CONFLICTS = [['A','H'],['B','E'],['D','F'],['G','C']];

function getBoardPool() {
  const boards = [];
  if (S.expansions.has('Base')) boards.push('A','B','C','D');
  if (S.expansions.has('Jagged Earth')) boards.push('E','F');
  if (S.includeHorizonsBoards) boards.push('G','H');
  return boards;
}

function getActiveSpirits() {
  return SPIRITS_DATA.filter(s => {
    if (!S.expansions.has(s.ex)) return false;
    if (s.aspect !== null) {
      const home = SPIRIT_HOME_EXP[s.name];
      if (home && !S.expansions.has(home)) return false;
    }
    return true;
  });
}

function hasConflict(boards) {
  return BOARD_CONFLICTS.some(([x, y]) => boards.includes(x) && boards.includes(y));
}

function pickBoards(n) {
  const pool = getBoardPool();
  if (!S.balanceBoards || S.players > 4) {
    return shuffle([...pool]).slice(0, n);
  }
  for (let i = 0; i < 300; i++) {
    const candidate = shuffle([...pool]).slice(0, n);
    if (!hasConflict(candidate)) return candidate;
  }
  return shuffle([...pool]).slice(0, n);
}

function pickOneBoard(excludeSet) {
  const pool = getBoardPool();
  const available = pool.filter(b => !excludeSet.has(b));
  if (!S.balanceBoards || S.players > 4) {
    return available[Math.floor(Math.random() * available.length)];
  }
  const otherBoards = [...excludeSet];
  const safe = available.filter(b => !BOARD_CONFLICTS.some(([x, y]) => {
    if (b === x) return otherBoards.includes(y);
    if (b === y) return otherBoards.includes(x);
    return false;
  }));
  const choices = safe.length > 0 ? safe : available;
  return choices[Math.floor(Math.random() * choices.length)];
}

function randomizeSpirits() {
  const pool = shuffle(getActiveSpirits());
  const usedNames = new Set();
  const picked = [];
  for (const s of pool) {
    if (picked.length >= S.players) break;
    if (usedNames.has(s.name)) continue;
    usedNames.add(s.name);
    picked.push(s);
  }
  const boards = pickBoards(S.players);
  S.spirits = picked.map((s, i) => ({ ...s, board: boards[i] }));
  renderSpiritsTable();
}

function rerollSpirit(idx) {
  const pool = shuffle(getActiveSpirits());
  const usedNames = new Set(S.spirits.filter((_, i) => i !== idx).map(s => s.name));
  const usedBoards = new Set(S.spirits.filter((_, i) => i !== idx).map(s => s.board));
  const newSpirit = pool.find(s => !usedNames.has(s.name));
  if (!newSpirit) return;
  const newBoard = pickOneBoard(usedBoards);
  S.spirits[idx] = { ...newSpirit, board: newBoard };
  renderSpiritsTable();
}

function renderSpiritsTable() {
  const tbody = $('spiritsBody');
  if (!S.spirits.length) {
    tbody.innerHTML = '<tr><td colspan="4" class="no-spirits">Press Randomize to assign spirits</td></tr>';
    return;
  }
  tbody.innerHTML = S.spirits.map((s, i) => {
    const spiritHtml = `<span class="spirit-name">${s.name}</span>` +
      (s.aspect ? `<span class="spirit-sep"> — </span><span class="spirit-aspect">${s.aspect}</span>` : '');
    return `<tr>
      <td class="col-num">${i + 1}</td>
      <td>${spiritHtml}</td>
      <td class="col-board">${s.board}</td>
      <td class="col-reroll"><button class="reroll-btn" data-idx="${i}">↻</button></td>
    </tr>`;
  }).join('');
  tbody.querySelectorAll('.reroll-btn').forEach(btn => {
    btn.addEventListener('click', () => rerollSpirit(parseInt(btn.dataset.idx)));
  });
}

// ═══════════════════════════════════════════════════════
// STAGE 2
// ═══════════════════════════════════════════════════════
function initStage2() {
  const menu = $('adversaryMenu');
  ADVERSARY_MENU_ORDER.forEach(key => {
    const b = document.createElement('button');
    b.className = 'adv-btn';
    b.textContent = ADVERSARY_META[key].label;
    b.dataset.key = key;
    b.addEventListener('click', () => selectAdversary(key));
    menu.appendChild(b);
  });

  for (let i = 0; i <= 6; i++) {
    const b = document.createElement('button');
    b.textContent = i;
    b.dataset.level = i;
    b.addEventListener('click', () => selectLevel(i));
    $('levelBtns').appendChild(b);
  }

  $('randomizeAdvBtn').addEventListener('click', randomizeAdversary);
  $('stage2BackBtn').addEventListener('click', () => showStage(1));
  $('stage2Btn').addEventListener('click', () => { renderSetup(); showStage(3); });
}

function updateStage2() {
  selectAdversary(S.adversary);
  selectLevel(S.level);
}

function selectAdversary(key) {
  S.adversary = key;
  document.querySelectorAll('.adv-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.key === key);
  });

  const meta = ADVERSARY_META[key];
  const imgEl = $('adversaryImg');
  const noImg = $('noImage');
  if (meta.image) {
    imgEl.src = meta.image;
    imgEl.style.display = 'block';
    noImg.style.display = 'none';
  } else {
    imgEl.style.display = 'none';
    noImg.textContent = meta.label;
    noImg.style.display = 'block';
  }

  const maxLevel = ADVERSARY_LEVELS[key].length - 1;
  document.querySelectorAll('#levelBtns button').forEach((b, i) => {
    b.classList.toggle('hidden-btn', i > maxLevel);
  });

  if (S.level > maxLevel) S.level = 0;
  selectLevel(S.level);
}

function selectLevel(n) {
  S.level = n;
  document.querySelectorAll('#levelBtns button').forEach((b, i) => {
    b.classList.toggle('active', i === n);
  });

  const data = getLevelData();
  const dd = $('difficultyDisplay');
  dd.style.display = 'block';
  $('diffValue').textContent = data.difficulty;
}

function randomizeAdversary() {
  const keys = ADVERSARY_MENU_ORDER.filter(k => k !== 'None');
  const key = keys[Math.floor(Math.random() * keys.length)];
  selectAdversary(key);
  const maxLevel = ADVERSARY_LEVELS[key].length - 1;
  const lvl = Math.floor(Math.random() * (maxLevel + 1));
  selectLevel(lvl);
}

// ═══════════════════════════════════════════════════════

  $('stage3BackBtn').addEventListener('click', () => showStage(2));
  $('stage3Btn').addEventListener('click', () => { initGameGuide(); showStage(4); });
}

function renderSetup() {
  const data = getLevelData();
  const meta = ADVERSARY_META[S.adversary];
  const advLabel = S.adversary === 'None' ? 'No Adversary' : `${meta.label} — Level ${S.level}`;
  $('stage3Title').textContent = advLabel;

  const cards = [];

  cards.push(card('Difficulty', data.difficulty));
  cards.push(card('Invader Deck', data.invaderDeck));
  cards.push(card('Fear Cards', data.fearDeck));
  cards.push(card('Fear Pool', data.fearPerPlayer + ` per player → Total: ${data.fearPerPlayer * S.players}`));
  cards.push(`<div class="setup-card full-col"><div class="setup-label">Pieces (Setup)</div><div class="setup-value">${fmtText(data.pieces)}</div></div>`);
  if (data.constantReminder) {
    cards.push(`<div class="setup-card constant-reminder-card full-col">
      <div class="setup-label">⚠ Constant Reminder — Remember this throughout the game!</div>
      <div class="setup-value">${fmtText(data.constantReminder)}</div>
    </div>`);
  }
  if (data.lossCondition) cards.push(card('Loss Condition', fmtText(data.lossCondition)));
  if (data.escalation) cards.push(card('Escalation', fmtText(data.escalation)));

  $('stage3Content').innerHTML = cards.join('');
}

function card(label, value) {
  return `<div class="setup-card">
    <div class="setup-label">${label}</div>
    <div class="setup-value">${value}</div>
  </div>`;
}

// ═══════════════════════════════════════════════════════
// STAGE 4
// ═══════════════════════════════════════════════════════
function addLongPress(el, cb, ms = 500) {
  let timer = null, sx = 0, sy = 0;
  const start = e => {
    const t = e.touches ? e.touches[0] : e;
    sx = t.clientX; sy = t.clientY;
    timer = setTimeout(() => { timer = null; cb(); }, ms);
  };
  const cancel = () => { if (timer) { clearTimeout(timer); timer = null; } };
  const move = e => {
    if (!timer) return;
    const t = e.touches ? e.touches[0] : e;
    if (Math.abs(t.clientX - sx) > 8 || Math.abs(t.clientY - sy) > 8) cancel();
  };
  el.addEventListener('touchstart', start, { passive: true });
  el.addEventListener('touchend',   cancel);
  el.addEventListener('touchcancel',cancel);
  el.addEventListener('touchmove',  move,   { passive: true });
  el.addEventListener('mousedown',  start);
  el.addEventListener('mouseup',    cancel);
  el.addEventListener('mousemove',  move);
}

function renderReminders() {
  const phase = S.activePhases[S.phaseIdx];
  const bar = $('reminderBar');
  if (!phase) { bar.innerHTML = ''; return; }
  const list = S.reminders[phase.key] || [];
  if (!list.length) { bar.innerHTML = ''; return; }
  bar.innerHTML = list.map(r => {
    const hasText = r.text && r.text.trim();
    const txt = hasText
      ? r.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')
      : null;
    return `<div class="reminder-chip">
      <div class="reminder-chip-text${hasText ? '' : ' empty'}">${txt || '⚑ Reminder'}</div>
      <button class="reminder-chip-btn" data-id="${r.id}">×</button>
    </div>`;
  }).join('');
  bar.querySelectorAll('.reminder-chip-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = Number(btn.dataset.id);
      S.reminders[phase.key] = (S.reminders[phase.key] || []).filter(r => r.id !== id);
      renderReminders();
    });
  });
}

function initStage4() {
  $('fearMinus').addEventListener('click', () => changeFear(-1));
  $('fearPlus').addEventListener('click', () => changeFear(+1));
  $('prevPhaseBtn').addEventListener('click', () => navigatePhase(-1));
  $('nextPhaseBtn').addEventListener('click', () => navigatePhase(+1));
  $('stage4BackBtn').addEventListener('click', () => showStage(3));
  $('editFearMaxBtn').addEventListener('click', openFearModal);
  $('modalCancel').addEventListener('click', closeModal);
  $('modalConfirm').addEventListener('click', confirmFearEdit);

  let editingPhaseKey = null;

  function openReminderForm(key, label) {
    editingPhaseKey = key;
    $('reminderFormFor').textContent = `Reminder for: ${label}`;
    $('reminderInput').value = '';
    $('reminderForm').classList.remove('hidden');
    $('reminderInput').focus();
  }

  function closeReminderForm() {
    $('reminderForm').classList.add('hidden');
    editingPhaseKey = null;
    $('reminderInput').value = '';
  }

  $('reminderCancelBtn').addEventListener('click', closeReminderForm);
  $('reminderSaveBtn').addEventListener('click', () => {
    if (!editingPhaseKey) return;
    const text = $('reminderInput').value;
    if (!S.reminders[editingPhaseKey]) S.reminders[editingPhaseKey] = [];
    S.reminders[editingPhaseKey].push({ id: Date.now(), text });
    renderReminders();
    // refresh list dots without navigating
    document.querySelectorAll('.phase-list-item').forEach(el => {
      const idx = parseInt(el.dataset.idx);
      const p = S.activePhases[idx];
      const dot = el.querySelector('.reminder-dot');
      const hasDot = !!(S.reminders[p.key] || []).length;
      if (hasDot && !dot) {
        const d = document.createElement('span');
        d.className = 'reminder-dot';
        el.appendChild(d);
      }
    });
    closeReminderForm();
  });
}

function initGameGuide() {
  const data = getLevelData();
  const meta = ADVERSARY_META[S.adversary];

  // Zone 1: header
  $('headerFlag').style.display = meta.flag ? 'block' : 'none';
  if (meta.flag) $('headerFlag').src = meta.flag;

  const advLabel = S.adversary === 'None'
    ? `No Adversary — Difficulty ${data.difficulty}`
    : `${meta.label} — Level ${S.level} — Difficulty ${data.difficulty}`;
  $('headerTitle').textContent = advLabel;
  $('headerDifficulty').style.display = 'none';
  $('headerLoss').innerHTML = data.lossCondition
    ? '<span style="color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-right:6px">Loss:</span>' + fmtText(data.lossCondition)
    : '';
  $('escalationText').innerHTML = data.escalation ? fmtText(data.escalation) : '—';

  const crBar = $('constantReminderBar');
  if (data.constantReminder) {
    crBar.innerHTML = fmtText(data.constantReminder);
    crBar.classList.remove('hidden');
  } else {
    crBar.classList.add('hidden');
  }

  // Fear counter
  S.fearCurrent = 0;
  S.fearMax = data.fearPerPlayer * S.players;
  updateFearDisplay();

  // Phases
  S.activePhases = PHASE_ORDER.filter(p => data.phases[p.key] !== 'Disabled');
  S.phaseIdx = 0;
  renderPhase();
}

// ── Fear ──
function changeFear(delta) {
  S.fearCurrent = Math.max(0, S.fearCurrent + delta);
  if (S.fearCurrent >= S.fearMax) {
    S.fearCurrent = 0;
    showFearCard();
  }
  updateFearDisplay();
}

function updateFearDisplay() {
  $('fearY').textContent = S.fearCurrent;
  $('fearX').textContent = S.fearMax;
}

function showFearCard() {
  const msg = $('fearCardMsg');
  msg.classList.remove('hidden');
  setTimeout(() => msg.classList.add('hidden'), 2500);
}

function openFearModal() {
  $('modalInput').value = S.fearMax;
  $('modalDesc').textContent = `Current fear target: ${S.fearMax}`;
  $('modal').classList.remove('hidden');
  setTimeout(() => $('modalInput').focus(), 100);
}

function closeModal() {
  $('modal').classList.add('hidden');
}

function confirmFearEdit() {
  const val = parseInt($('modalInput').value, 10);
  if (val > 0) {
    S.fearMax = val;
    updateFearDisplay();
  }
  closeModal();
}

// ── Phases ──
function navigatePhase(dir) {
  S.phaseIdx = (S.phaseIdx + dir + S.activePhases.length) % S.activePhases.length;
  renderPhase();
}

function renderPhase() {
  const phase = S.activePhases[S.phaseIdx];
  if (!phase) return;

  $('phaseLabel').textContent = phase.label;

  const data = getLevelData();
  const content = data.phases[phase.key];
  const body = $('phaseBody');
  if (content) {
    body.innerHTML = `<div class="phase-text">${fmtText(content)}</div>`;
  } else {
    body.innerHTML = `<div class="no-special">No special rules for this phase.</div>`;
  }

  const list = $('phaseList');
  list.innerHTML = S.activePhases.map((p, i) => {
    const dot = (S.reminders[p.key] || []).length ? '<span class="reminder-dot"></span>' : '';
    return `<div class="phase-list-item${i === S.phaseIdx ? ' active' : ''}" data-idx="${i}">${p.label}${dot}</div>`;
  }).join('');
  list.querySelectorAll('.phase-list-item').forEach(el => {
    let longFired = false;
    addLongPress(el, () => {
      longFired = true;
      const idx = parseInt(el.dataset.idx);
      const p = S.activePhases[idx];
      openReminderForm(p.key, p.label);
    });
    el.addEventListener('click', () => {
      if (longFired) { longFired = false; return; }
      S.phaseIdx = parseInt(el.dataset.idx);
      renderPhase();
    });
  });
  const activeItem = list.querySelector('.phase-list-item.active');
  if (activeItem) activeItem.scrollIntoView({ block: 'nearest' });
  renderReminders();
}
</script>
</body>
